name: itop-ai-assistant
services:
  itop:
    image: vbkunin/itop
    ports:
      - "8000:80"
    volumes:
      - itop-db:/var/lib/mysql
    environment:
      MYSQL_PASS: 123456

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # Vector store backend (optional): the assistant runs Redis-only until
  # DATABASE_URL is set, so `assistant` deliberately has no depends_on here.
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
    volumes:
      - postgres-data:/var/lib/postgresql/data

  assistant:
    image: ghcr.io/knowitop/itop-ai-assistant:latest
#    build:
#      context: ..
#      dockerfile: assistant/Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  itop-db:
  redis-data:
  postgres-data:
